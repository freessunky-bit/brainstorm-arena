<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Brainstorm Arena — AI 기반 아이디어 검증" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Brainstorm Arena</title>
    <style>
      html, body {
        margin: 0; padding: 0;
        background: #ffffff;
        color: #191f28;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
        background: #ffffff;
      }
      #initial-loader {
        position: fixed; inset: 0;
        background: #ffffff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 14px; z-index: 9999;
      }
      #initial-loader .il-mark {
        width: 56px; height: 56px; border-radius: 16px;
        background: linear-gradient(145deg, #3182f6 0%, #2563eb 50%, #7c3aed 100%);
        box-shadow: 0 6px 20px rgba(49,130,246,0.18);
        display: flex; align-items: center; justify-content: center;
        animation: ilPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      #initial-loader .il-mark svg {
        width: 26px; height: 26px;
      }
      #initial-loader .il-dots {
        display: flex; gap: 5px;
        animation: ilFade 0.3s 0.1s ease both;
        opacity: 0;
      }
      #initial-loader .il-dots span {
        width: 4px; height: 4px; border-radius: 50%;
        background: #ced4da;
        animation: ilBounce 1s ease-in-out infinite;
      }
      #initial-loader .il-dots span:nth-child(2) { animation-delay: 0.12s; }
      #initial-loader .il-dots span:nth-child(3) { animation-delay: 0.24s; }
      @keyframes ilPop {
        from { opacity: 0; transform: scale(0.5); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes ilFade {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes ilBounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
        40%            { transform: translateY(-4px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="il-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4.5"/>
            <path d="M9 13.5c0 1.2.5 2.5 3 3s3-1.8 3-3"/>
            <line x1="12" y1="16.5" x2="12" y2="19"/>
            <line x1="10" y1="19" x2="14" y2="19"/>
          </svg>
        </div>
        <div class="il-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
